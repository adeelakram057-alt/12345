backend:
  name: github
  repo: adeelakram057-alt/12345
  branch: main
  base_url: https://oauth.sveltia.com
  auth_endpoint: /github
  app_id: Ov23liGIKt5TbYmCWui5

media_folder: images/uploads
public_folder: /images/uploads

# Force JSON format — very important!
format: json
extension: json

collections:
  - name: scholarships
    label: Scholarships
    folder: scholarships
    create: true
    format: json
    extension: json
    slug: "{{slug}}"
    summary: "{{title}} — {{country}} | {{deadline}}"
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Date Added, name: date_added, widget: datetime, date_format: YYYY-MM-DD, time_format: false}
      - {label: Status, name: status, widget: select, options: [open, soon, closed], default: open}
      - {label: Country, name: country, widget: string}
      - {label: Flag Emoji, name: flag, widget: string, hint: "Paste flag emoji e.g. 🇩🇪 🇺🇸 🇬🇧 🇨🇳 🇹🇼"}
      - {label: Level, name: level, widget: string, hint: "e.g. MS / PhD or BS / MS / PhD"}
      - {label: Funding Type, name: funding_type, widget: select, options: [Fully Funded, Partial Funding, Tuition Only, Stipend Only], default: Fully Funded}
      - {label: Amount, name: amount, widget: string, hint: "e.g. €934/month"}
      - {label: Deadline, name: deadline, widget: string, hint: "e.g. November 15, 2026"}
      - {label: Duration, name: duration, widget: string, hint: "e.g. 1-3 Years"}
      - {label: Host, name: host, widget: string}
      - {label: Short Description, name: description, widget: text}
      - {label: Full Description, name: full_description, widget: markdown}
      - {label: Website URL, name: website, widget: string}
      - {label: YouTube URL, name: youtube_url, widget: string, required: false}
      - {label: Facebook URL, name: facebook_url, widget: string, required: false}
      - {label: Tags, name: tags, widget: list, hint: "e.g. europe, fully, ms, phd"}
      - {label: "Featured — Pin to Top", name: featured, widget: boolean, default: false}

  - name: settings
    label: Site Settings
    files:
      - label: General Settings
        name: general
        file: settings/general.json
        format: json
        fields:
          - {label: Site Name, name: site_name, widget: string}
          - {label: Facebook URL, name: facebook_url, widget: string}
          - {label: YouTube URL, name: youtube_url, widget: string}
          - {label: Facebook Followers, name: fb_followers, widget: string}
          - {label: YouTube Subscribers, name: yt_subscribers, widget: string}
